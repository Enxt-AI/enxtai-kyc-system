services:
  # Staging object storage used by backend for document uploads.
  minio:
    image: minio/minio:latest
    container_name: kyc-minio-staging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - kyc-aws-staging

  # Backend API container. Database and Redis are external managed services.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kyc-api-staging
    env_file:
      - .env.aws
    environment:
      # Force service discovery for in-cluster MinIO in staging compose.
      MINIO_ENDPOINT: minio
    ports:
      - "3001:3001"
    depends_on:
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - kyc-aws-staging

volumes:
  minio_data:

networks:
  kyc-aws-staging:
    driver: bridge
