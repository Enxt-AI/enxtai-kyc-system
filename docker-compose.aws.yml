services:
  # Backend API container. Database and Redis are external managed services.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kyc-api-staging
    env_file:
      - .env.aws
    environment:
      # AWS S3 is used for object storage
    ports:
      - "3001:3001"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - kyc-aws-staging



networks:
  kyc-aws-staging:
    driver: bridge
